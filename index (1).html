<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>G-Pack — The Gastronomy Project</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #0d0d0b; }
  iframe { border: none; width: 100vw; height: 100vh; display: block; }
</style>
</head>
<body>
<iframe id="frame"></iframe>
<script>

// ============================================================
// EDIT THIS LINE TO CHANGE YOUR INTAKE URL
// ============================================================
var INTAKE_URL = "https://go.thegastronomyproject.com/start-online-visit/gpk";
// ============================================================

// File names must match exactly what is in your GitHub repo
var DESKTOP_FILE = "G-Pack Desktop Land v30.html";
var MOBILE_FILE  = "G-Pack Mobile Land v6final.html";

function load() {
  var frame = document.getElementById('frame');
  var isDesktop = window.innerWidth >= 1024;
  var file = isDesktop ? DESKTOP_FILE : MOBILE_FILE;

  frame.scrolling  = isDesktop ? 'no'  : 'yes';
  frame.style.overflow = isDesktop ? 'hidden' : 'auto';

  // Load the file then inject the intake URL into buttons
  fetch(file)
    .then(function(r) { return r.text(); })
    .then(function(html) {
      // Inject URL into CTA buttons
      html = html.replace(
        /(<button[^>]*class="cta[^"]*")/g,
        '$1 onclick="window.top.location.href=\'' + INTAKE_URL + '\'"'
      );
      // Inject URL into quiz strip
      html = html.replace(
        /(<div[^>]*class="quiz-strip[^"]*")/g,
        '$1 onclick="window.top.location.href=\'' + INTAKE_URL + '\'" style="cursor:pointer;"'
      );
      var blob = new Blob([html], {type: 'text/html; charset=utf-8'});
      frame.src = URL.createObjectURL(blob);
    });
}

load();

var lastWidth = window.innerWidth;
window.addEventListener('resize', function() {
  var newWidth = window.innerWidth;
  if ((lastWidth >= 1024) !== (newWidth >= 1024)) {
    lastWidth = newWidth;
    load();
  }
});
</script>
</body>
</html>
